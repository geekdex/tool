<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化 - Tool 开发者工具集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../components/shared-styles.css">
    <script src="../components/load-components.js"></script>
    <style>
        /* 工具栏 */
        .toolbar {
            display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
            padding: 8px 12px; background: #f8f9fb; border-radius: 10px; border: 1px solid #eef0f4;
        }
        .toolbar .tool-btn { border-radius: 8px; }
        .toolbar .tool-btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            box-shadow: 0 2px 8px rgba(67,97,238,0.25);
        }
        .toolbar .tool-btn-primary:hover {
            box-shadow: 0 4px 14px rgba(67,97,238,0.35); transform: translateY(-1px);
        }
        .toolbar .tool-btn-outline { border-color: #dfe2e8; }
        .indent-select {
            padding: 7px 12px; border: 1px solid #dfe2e8; border-radius: 8px; font-size: 0.82rem;
            cursor: pointer; background: white; color: #555; margin-left: 4px;
        }
        .indent-select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(67,97,238,0.08); }

        /* 编辑区 */
        .editor-grid { display: flex; flex-direction: column; gap: 12px; }
        .editor-panel {
            display: flex; flex-direction: column;
            border: 1px solid #e9ecef; border-radius: 10px; overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .editor-panel:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: #f8f9fb; cursor: pointer; user-select: none;
            border-bottom: 1px solid #e9ecef; transition: background 0.15s;
        }
        .panel-header:hover { background: #f0f2f6; }
        .panel-header-left {
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; color: var(--dark-color); font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .panel-header-left i { font-size: 0.7rem; color: var(--primary-color); }
        .panel-toggle {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: #999; cursor: pointer;
            border-radius: 6px; transition: all 0.2s; font-size: 0.7rem;
        }
        .panel-toggle:hover { background: #e9ecef; color: #555; }
        .panel-body {
            overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease;
            max-height: 600px; opacity: 1;
        }
        .panel-body.collapsed { max-height: 0; opacity: 0; }
        .panel-body.scrollable { overflow: auto; }
        .panel-header .fa-chevron-up { transition: transform 0.3s ease; }
        .editor-panel.collapsed .panel-header .fa-chevron-up { transform: rotate(180deg); }
        .json-input, .json-output {
            width: 100%; min-height: 300px; padding: 12px; border: none;
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace;
            font-size: 0.82rem; resize: vertical; line-height: 1.6;
        }
        .json-input {
            background: #fdfdfe;
            background-image: repeating-linear-gradient(
                transparent, transparent 25.6px, #f0f2f6 25.6px, #f0f2f6 25.7px
            );
            background-attachment: local;
        }
        .json-input:focus { outline: none; background: #fff; }
        .json-output {
            background: #ffffff; color: #333; overflow: auto;
            white-space: pre-wrap; word-break: break-all;
        }

        /* 拖拽调整手柄 */
        .resize-handle {
            height: 8px; cursor: ns-resize; background: #f8f9fb; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; flex-shrink: 0;
            border-top: 1px solid #e9ecef;
        }
        .resize-handle:hover, .resize-handle.active { background: #eef0f4; }
        .resize-handle::after {
            content: ''; width: 36px; height: 3px; border-radius: 2px;
            background: #d0d3da; transition: background 0.15s;
        }
        .resize-handle:hover::after, .resize-handle.active::after { background: var(--primary-color); }

        /* 语法高亮 */
        .json-key { color: #0451a5; }
        .json-string { color: #a31515; }
        .json-number { color: #098658; }
        .json-boolean { color: #0000ff; }
        .json-null { color: #808080; font-style: italic; }

        /* 树形视图 */
        .tree-toggle { cursor: pointer; user-select: none; border-radius: 4px; transition: background 0.15s; }
        .tree-toggle:hover { background: rgba(0,0,0,0.04); }
        .tree-content { padding-left: 20px; }
        .tree-collapsed .tree-content { display: none; }
        .tree-key { color: #0451a5; }
        .tree-bracket { color: #808080; }
        .tree-string { color: #a31515; }
        .tree-number { color: #098658; }
        .tree-boolean { color: #0000ff; }
        .tree-null { color: #808080; }
        .tree-count { color: #808080; font-size: 0.85em; margin-left: 4px; }

        /* 状态栏 */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 8px 4px;
            margin-top: 6px; font-size: 0.78rem;
        }
        .status-valid { color: #22c55e; font-weight: 500; }
        .status-invalid { color: #ef4444; font-weight: 500; }
        .status-info { color: var(--gray-color); }

        /* 视图切换 */
        .view-tabs { display: flex; gap: 2px; background: #f0f2f6; border-radius: 8px; padding: 3px; }
        .view-tab {
            padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.78rem; font-weight: 500; background: transparent; transition: var(--transition);
            color: #666;
        }
        .view-tab.active { background: white; color: var(--primary-color); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .view-tab:hover:not(.active) { color: #333; }

        @media (max-width: 768px) {
            .json-input, .json-output { min-height: 200px; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="container tool-main">
        <h1 class="tool-page-title"><i class="fas fa-code" style="color:#ff9e00;"></i> JSON格式化</h1>
        <p class="tool-page-subtitle">格式化、验证、压缩 JSON 数据，支持语法高亮与树形视图</p>
        <div class="tool-content">
        <div class="tool-card">
            <div class="toolbar">
                <button class="tool-btn tool-btn-primary" id="formatBtn"><i class="fas fa-magic"></i> 格式化</button>
                <button class="tool-btn tool-btn-outline" id="minifyBtn"><i class="fas fa-compress"></i> 压缩</button>
                <select class="indent-select" id="indentSelect">
                    <option value="2">缩进: 2空格</option>
                    <option value="4">缩进: 4空格</option>
                    <option value="tab">缩进: Tab</option>
                </select>
                <button class="tool-btn tool-btn-outline" id="sampleBtn"><i class="fas fa-file-code"></i> 示例</button>
                <button class="tool-btn tool-btn-outline" id="copyBtn"><i class="fas fa-copy"></i> 复制结果</button>
                <button class="tool-btn tool-btn-outline" id="clearBtn"><i class="fas fa-trash"></i> 清空</button>
            </div>

            <div class="editor-grid">
                <div class="editor-panel" id="inputPanel">
                    <div class="panel-header" onclick="togglePanel('inputPanel')">
                        <div class="panel-header-left"><i class="fas fa-edit"></i> 输入 JSON</div>
                        <button class="panel-toggle"><i class="fas fa-chevron-up"></i></button>
                    </div>
                    <div class="panel-body" id="inputBody">
                        <textarea class="json-input" id="jsonInput" placeholder="在此粘贴 JSON 数据..." spellcheck="false"></textarea>
                    </div>
                </div>
                <div class="editor-panel" id="outputPanel">
                    <div class="panel-header" onclick="togglePanel('outputPanel')">
                        <div class="panel-header-left"><i class="fas fa-eye"></i> 输出结果</div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div class="view-tabs" onclick="event.stopPropagation()">
                                <div class="view-tab active" data-view="code">代码</div>
                                <div class="view-tab" data-view="tree">树形</div>
                            </div>
                            <button class="panel-toggle"><i class="fas fa-chevron-up"></i></button>
                        </div>
                    </div>
                    <div class="panel-body scrollable" id="outputBody">
                        <div class="json-output" id="jsonOutput"><span style="color:#6c7086;">格式化结果将显示在这里</span></div>
                    </div>
                    <div class="resize-handle" id="outputResizeHandle"></div>
                </div>
            </div>

            <div class="status-bar">
                <span id="statusText" class="status-info">等待输入...</span>
                <span id="sizeInfo" class="status-info"></span>
            </div>
        </div>
        </div>
    </main>
    <div id="footer-container"></div>

    <script>
        let currentView = 'code';
        let lastFormatted = '';

        const sampleJson = {
            "name": "Tool 开发者工具集",
            "version": "1.0.0",
            "description": "现代化在线开发者工具集合",
            "tools": [
                { "id": 1, "name": "时间戳转换", "category": "time", "active": true },
                { "id": 2, "name": "JSON格式化", "category": "development", "active": true }
            ],
            "author": { "name": "xiaoqi", "email": "pan.hy@foxmail.com" },
            "config": { "theme": "light", "language": "zh-CN", "maxTools": 50 },
            "tags": ["工具", "开发", "效率", "在线"],
            "stats": null
        };

        function resetOutputHeight() {
            const body = document.getElementById('outputBody');
            body.style.maxHeight = '';
        }

        function getIndent() {
            const v = document.getElementById('indentSelect').value;
            return v === 'tab' ? '\t' : parseInt(v);
        }

        function syntaxHighlight(json) {
            return json.replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    cls = /:$/.test(match) ? 'json-key' : 'json-string';
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return `<span class="${cls}">${escapeHtml(match)}</span>`;
            });
        }

        function buildTree(data, key, isLast) {
            const comma = isLast ? '' : '<span class="tree-bracket">,</span>';
            if (data === null) return `<span class="tree-key">"${escapeHtml(key)}"</span>: <span class="tree-null">null</span>${comma}`;
            if (typeof data === 'boolean') return `<span class="tree-key">"${escapeHtml(key)}"</span>: <span class="tree-boolean">${data}</span>${comma}`;
            if (typeof data === 'number') return `<span class="tree-key">"${escapeHtml(key)}"</span>: <span class="tree-number">${data}</span>${comma}`;
            if (typeof data === 'string') return `<span class="tree-key">"${escapeHtml(key)}"</span>: <span class="tree-string">"${escapeHtml(data)}"</span>${comma}`;

            const isArray = Array.isArray(data);
            const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
            const open = isArray ? '<span class="tree-bracket">[</span>' : '<span class="tree-bracket">{</span>';
            const close = isArray ? '<span class="tree-bracket">]</span>' : '<span class="tree-bracket">}</span>';
            const count = `<span class="tree-count">// ${entries.length} ${isArray ? 'items' : 'keys'}</span>`;

            let html = `<div class="tree-toggle" onclick="this.classList.toggle('tree-collapsed')">`;
            html += `<span class="tree-key">"${escapeHtml(key)}"</span>: ${open}${count}${close}${comma}`;
            html += `<div class="tree-content">`;
            entries.forEach(([k, v], i) => {
                html += `<div>${buildTree(v, k, i === entries.length - 1)}</div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const body = panel.querySelector('.panel-body');
            panel.classList.toggle('collapsed');
            body.classList.toggle('collapsed');
            // 展开时恢复滚动，折叠时禁用
            if (body.classList.contains('collapsed')) {
                body.classList.remove('scrollable');
            } else {
                body.classList.add('scrollable');
            }
        }

        function format() {
            const input = document.getElementById('jsonInput').value.trim();
            const statusEl = document.getElementById('statusText');
            const sizeEl = document.getElementById('sizeInfo');
            const outputEl = document.getElementById('jsonOutput');

            if (!input) {
                statusEl.textContent = '等待输入...'; statusEl.className = 'status-info';
                sizeEl.textContent = ''; resetOutputHeight();
                outputEl.innerHTML = '<span style="color:#6c7086;">格式化结果将显示在这里</span>';
                lastFormatted = ''; return;
            }

            try {
                const obj = JSON.parse(input);
                const indent = getIndent();
                const formatted = JSON.stringify(obj, null, indent);
                lastFormatted = formatted;
                sizeEl.textContent = `${formatted.length} 字符`;
                resetOutputHeight();

                if (currentView === 'tree') {
                    renderTree(obj);
                } else {
                    outputEl.innerHTML = syntaxHighlight(formatted);
                }

                const type = Array.isArray(obj) ? 'Array' : typeof obj;
                const len = Array.isArray(obj) ? obj.length : (typeof obj === 'object' ? Object.keys(obj).length : '');
                statusEl.textContent = `有效 JSON (${type}${len !== '' ? ', ' + len + ' 项' : ''})`;
                statusEl.className = 'status-valid';
            } catch(e) {
                const msg = e.message;
                const match = msg.match(/position\s+(\d+)/i);
                let detail = msg;
                if (match) {
                    const pos = parseInt(match[1]);
                    const line = input.substring(0, pos).split('\n').length;
                    detail = `${msg} (第 ${line} 行)`;
                }
                statusEl.textContent = '无效 JSON: ' + detail;
                statusEl.className = 'status-invalid';
                sizeEl.textContent = '';
                resetOutputHeight();
                outputEl.innerHTML = `<span style="color:#ef4444;">${escapeHtml(msg)}</span>`;
                lastFormatted = '';
            }
        }

        function renderTree(obj) {
            const outputEl = document.getElementById('jsonOutput');
            outputEl.innerHTML = '<div style="font-size:0.88rem;line-height:1.8;padding:8px;">' + buildTree(obj, 'root', true) + '</div>';
        }

        function copyText(text) {
            const btn = document.getElementById('copyBtn');
            if (!text) return;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> 复制结果'; }, 1500);
                }).catch(() => {});
            }
        }

        document.getElementById('formatBtn').addEventListener('click', format);
        document.getElementById('minifyBtn').addEventListener('click', () => {
            const input = document.getElementById('jsonInput').value.trim();
            try {
                const obj = JSON.parse(input);
                const minified = JSON.stringify(obj);
                resetOutputHeight();
                document.getElementById('jsonOutput').innerHTML = syntaxHighlight(minified);
                lastFormatted = minified;
                document.getElementById('sizeInfo').textContent = `${minified.length} 字符`;
                document.getElementById('statusText').textContent = '压缩成功';
                document.getElementById('statusText').className = 'status-valid';
            } catch(e) {
                resetOutputHeight();
                document.getElementById('statusText').textContent = '无效 JSON: ' + e.message;
                document.getElementById('statusText').className = 'status-invalid';
            }
        });
        document.getElementById('sampleBtn').addEventListener('click', () => {
            document.getElementById('jsonInput').value = JSON.stringify(sampleJson, null, 2);
            format();
        });
        document.getElementById('copyBtn').addEventListener('click', () => copyText(lastFormatted));
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('jsonInput').value = '';
            resetOutputHeight();
            document.getElementById('jsonOutput').innerHTML = '<span style="color:#6c7086;">格式化结果将显示在这里</span>';
            document.getElementById('statusText').textContent = '等待输入...';
            document.getElementById('statusText').className = 'status-info';
            document.getElementById('sizeInfo').textContent = '';
            lastFormatted = '';
        });
        document.getElementById('indentSelect').addEventListener('change', format);

        // View tabs
        document.querySelectorAll('.view-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentView = this.dataset.view;
                if (lastFormatted) {
                    const input = document.getElementById('jsonInput').value.trim();
                    try {
                        const obj = JSON.parse(input);
                        resetOutputHeight();
                        if (currentView === 'tree') renderTree(obj);
                        else document.getElementById('jsonOutput').innerHTML = syntaxHighlight(lastFormatted);
                    } catch(e) {}
                }
            });
        });

        // 拖拽调整输出区域高度
        (function() {
            const handle = document.getElementById('outputResizeHandle');
            const outputBody = document.getElementById('outputBody');
            const outputPanel = document.getElementById('outputPanel');
            let startY, startHeight, isResizing = false;

            handle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                isResizing = true;
                handle.classList.add('active');
                startY = e.clientY;
                startHeight = outputBody.offsetHeight;
                document.body.style.cursor = 'ns-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                const delta = e.clientY - startY;
                const newHeight = Math.max(100, startHeight + delta);
                outputBody.style.maxHeight = newHeight + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (!isResizing) return;
                isResizing = false;
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });

            // 触摸支持
            handle.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                isResizing = true;
                handle.classList.add('active');
                startY = touch.clientY;
                startHeight = outputBody.offsetHeight;
            }, { passive: true });

            document.addEventListener('touchmove', function(e) {
                if (!isResizing) return;
                const touch = e.touches[0];
                const delta = touch.clientY - startY;
                const newHeight = Math.max(100, startHeight + delta);
                outputBody.style.maxHeight = newHeight + 'px';
            }, { passive: true });

            document.addEventListener('touchend', function() {
                if (!isResizing) return;
                isResizing = false;
                handle.classList.remove('active');
            });
        })();

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof ComponentLoader !== 'undefined') {
                ComponentLoader.initPage({ loadHeader: true, loadFooter: true, headerTarget: 'header-container', footerTarget: 'footer-container', activeNav: 'tools', basePath: '../components/', toolName: 'JSON格式化' });
            }
            // Load sample
            document.getElementById('jsonInput').value = JSON.stringify(sampleJson, null, 2);
            format();
        });
    </script>
</body>
</html>
