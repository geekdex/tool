<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - Tekio工具集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../components/shared-styles.css">
    <script src="../components/load-components.js"></script>
    <style>
        /* 密码展示 */
        .password-display {
            background: linear-gradient(135deg, #f8f9fb, #f0f2f6); border: 2px dashed #d0d5dd; border-radius: 14px;
            padding: 24px 20px; font-family: 'Consolas', 'Monaco', 'Fira Code', monospace; font-size: 1.5rem;
            text-align: center; word-break: break-all; min-height: 72px;
            display: flex; align-items: center; justify-content: center; color: var(--dark-color);
            letter-spacing: 2px; font-weight: 600; position: relative;
        }
        .password-display.has-value {
            border-style: solid; border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(67,97,238,0.03), rgba(72,149,239,0.05));
        }
        .password-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
        .tool-btn {
            padding: 10px 24px; border: none; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; font-weight: 600; transition: var(--transition); display: flex;
            align-items: center; gap: 8px;
        }
        .tool-btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white; box-shadow: 0 3px 12px rgba(67,97,238,0.25);
        }
        .tool-btn-primary:hover { box-shadow: 0 6px 20px rgba(67,97,238,0.35); transform: translateY(-2px); }
        .btn-secondary { background: #f0f2f6; color: #495057; }
        .btn-secondary:hover { background: #e5e7ec; transform: translateY(-1px); }

        /* 强度条 */
        .strength-bar { display: flex; gap: 6px; margin: 20px 0 10px; }
        .strength-seg {
            flex: 1; height: 5px; border-radius: 3px; background: #e9ecef; transition: background 0.4s ease;
        }
        .strength-label { font-size: 0.82rem; color: var(--gray-color); font-weight: 500; }
        .strength-label.weak { color: #ef4444; }
        .strength-label.fair { color: #f59e0b; }
        .strength-label.strong { color: #3b82f6; }
        .strength-label.very-strong { color: #22c55e; }

        /* 设置区 */
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid #f3f4f6;
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-label { font-weight: 600; color: var(--dark-color); font-size: 0.92rem; }
        .setting-hint { font-size: 0.78rem; color: var(--gray-color); margin-top: 2px; }
        .setting-control { display: flex; align-items: center; gap: 10px; }

        /* 长度滑块 */
        input[type="range"] {
            -webkit-appearance: none; width: 200px; height: 6px; border-radius: 3px;
            background: linear-gradient(90deg, var(--primary-color) 0%, #e9ecef 0%); outline: none;
            transition: background 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: white; cursor: pointer; border: 3px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(67,97,238,0.3); transition: box-shadow 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 3px 12px rgba(67,97,238,0.4);
        }
        .length-value {
            min-width: 40px; text-align: center; font-weight: 700; color: var(--primary-color);
            font-size: 1.2rem; font-family: 'Consolas', monospace;
        }

        /* 开关 */
        .toggle { position: relative; display: inline-block; width: 48px; height: 26px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #dfe2e8;
            border-radius: 26px; cursor: pointer; transition: var(--transition);
        }
        .toggle-slider::before {
            content: ''; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: var(--transition);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

        /* 批量数量 */
        .batch-select {
            padding: 7px 14px; border: 1px solid #dfe2e8; border-radius: 10px;
            font-size: 0.88rem; cursor: pointer; background: white; color: #555;
        }
        .batch-select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(67,97,238,0.08); }

        /* 历史记录 */
        .history-item {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
            background: #f8f9fb; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eef0f4;
            font-family: 'Consolas', 'Monaco', monospace; font-size: 0.88rem; word-break: break-all;
            transition: var(--transition);
        }
        .history-item:hover { border-color: var(--primary-color); background: rgba(67,97,238,0.02); }
        .history-item .copy-icon {
            cursor: pointer; color: var(--gray-color); padding: 4px 8px; transition: var(--transition);
            flex-shrink: 0; margin-left: 10px; border-radius: 6px;
        }
        .history-item .copy-icon:hover { color: var(--primary-color); background: rgba(67,97,238,0.06); }

        @media (max-width: 992px) {
            .setting-row { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
        @media (max-width: 768px) {
            input[type="range"] { width: 100%; }
            .password-display { font-size: 1.2rem; padding: 18px; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="container tool-main">
        <h1 class="tool-page-title"><i class="fas fa-key" style="color:var(--secondary-color);"></i> 密码生成器</h1>
        <p class="tool-page-subtitle">生成高强度随机密码，保护您的账户安全</p>
        <div class="tool-content">

        <div class="tool-card">
            <div class="password-display" id="passwordDisplay">点击下方按钮生成密码</div>
            <div class="password-actions">
                <button class="tool-btn tool-btn-primary" id="generateBtn"><i class="fas fa-sync-alt"></i> 生成密码</button>
                <button class="tool-btn btn-secondary" id="copyBtn"><i class="fas fa-copy"></i> 复制</button>
            </div>
            <div class="strength-bar">
                <div class="strength-seg" id="seg1"></div>
                <div class="strength-seg" id="seg2"></div>
                <div class="strength-seg" id="seg3"></div>
                <div class="strength-seg" id="seg4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="tool-card">
            <div class="tool-card-title">密码设置</div>
            <div class="setting-row">
                <div>
                    <div class="setting-label">密码长度</div>
                    <div class="setting-hint">建议至少16位</div>
                </div>
                <div class="setting-control">
                    <input type="range" id="lengthRange" min="4" max="128" value="20">
                    <span class="length-value" id="lengthValue">20</span>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">大写字母 (A-Z)</div>
                <label class="toggle"><input type="checkbox" id="upper" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label">小写字母 (a-z)</div>
                <label class="toggle"><input type="checkbox" id="lower" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label">数字 (0-9)</div>
                <label class="toggle"><input type="checkbox" id="digits" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label">特殊符号 (!@#$...)</div>
                <label class="toggle"><input type="checkbox" id="symbols" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label">排除歧义字符 (0Oo1lI)</div>
                <label class="toggle"><input type="checkbox" id="ambiguous"><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label">批量生成数量</div>
                <select class="batch-select" id="batchCount">
                    <option value="1">1 个</option>
                    <option value="3">3 个</option>
                    <option value="5">5 个</option>
                    <option value="10">10 个</option>
                </select>
            </div>
        </div>

        <div class="tool-card" id="historyCard" style="display:none;">
            <div class="tool-card-title">生成历史</div>
            <div id="historyList"></div>
        </div>
        </div>
    </main>
    <div id="footer-container"></div>

    <script>
        const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const LOWER = 'abcdefghijklmnopqrstuvwxyz';
        const DIGITS = '0123456789';
        const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        const AMBIGUOUS = 'OoIl10';
        let history = [];

        function getPool() {
            let pool = '';
            if (document.getElementById('upper').checked) pool += UPPER;
            if (document.getElementById('lower').checked) pool += LOWER;
            if (document.getElementById('digits').checked) pool += DIGITS;
            if (document.getElementById('symbols').checked) pool += SYMBOLS;
            if (document.getElementById('ambiguous').checked) {
                pool = pool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
            }
            return pool;
        }

        function generatePassword() {
            const pool = getPool();
            if (!pool) return '';
            const len = parseInt(document.getElementById('lengthRange').value);
            const array = new Uint32Array(len);
            crypto.getRandomValues(array);
            let pwd = '';
            for (let i = 0; i < len; i++) pwd += pool[array[i] % pool.length];
            return pwd;
        }

        function calcStrength(pwd) {
            if (!pwd) return { level: 0, label: '', cls: '' };
            const len = pwd.length;
            let types = 0;
            if (/[a-z]/.test(pwd)) types++;
            if (/[A-Z]/.test(pwd)) types++;
            if (/[0-9]/.test(pwd)) types++;
            if (/[^a-zA-Z0-9]/.test(pwd)) types++;
            const entropy = len * Math.log2(types || 1);
            if (entropy < 28) return { level: 1, label: '弱', cls: 'weak', color: '#ef4444' };
            if (entropy < 36) return { level: 2, label: '一般', cls: 'fair', color: '#f59e0b' };
            if (entropy < 60) return { level: 3, label: '强', cls: 'strong', color: '#3b82f6' };
            return { level: 4, label: '非常强', cls: 'very-strong', color: '#22c55e' };
        }

        function updateStrength(pwd) {
            const s = calcStrength(pwd);
            const segs = [document.getElementById('seg1'), document.getElementById('seg2'), document.getElementById('seg3'), document.getElementById('seg4')];
            const label = document.getElementById('strengthLabel');
            segs.forEach((seg, i) => {
                seg.style.background = i < s.level ? s.color : '#e9ecef';
            });
            label.textContent = s.label ? `密码强度：${s.label}` : '';
            label.className = 'strength-label ' + s.cls;
        }

        function copyText(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
        }

        function addToHistory(pwds) {
            history = pwds.concat(history).slice(0, 20);
            const card = document.getElementById('historyCard');
            const list = document.getElementById('historyList');
            card.style.display = 'block';
            list.innerHTML = history.map(p =>
                `<div class="history-item"><span>${p}</span><i class="fas fa-copy copy-icon" onclick="copyText('${p.replace(/'/g, "\\'")}')"></i></div>`
            ).join('');
        }

        function generate() {
            const count = parseInt(document.getElementById('batchCount').value);
            const pwds = [];
            for (let i = 0; i < count; i++) pwds.push(generatePassword());
            if (count === 1) {
                document.getElementById('passwordDisplay').textContent = pwds[0];
                document.getElementById('passwordDisplay').classList.add('has-value');
                updateStrength(pwds[0]);
            } else {
                document.getElementById('passwordDisplay').innerHTML = pwds.map(p => `<div style="margin:4px 0;">${p}</div>`).join('');
                document.getElementById('passwordDisplay').classList.add('has-value');
                updateStrength(pwds[0]);
            }
            addToHistory(pwds);
        }

        document.getElementById('lengthRange').addEventListener('input', function() {
            document.getElementById('lengthValue').textContent = this.value;
            const pct = ((this.value - this.min) / (this.max - this.min)) * 100;
            this.style.background = `linear-gradient(90deg, var(--primary-color) ${pct}%, #e9ecef ${pct}%)`;
        });
        document.getElementById('generateBtn').addEventListener('click', generate);
        document.getElementById('copyBtn').addEventListener('click', function() {
            const text = document.getElementById('passwordDisplay').textContent;
            if (text && text !== '点击下方按钮生成密码') {
                copyText(text);
                this.innerHTML = '<i class="fas fa-check"></i> 已复制';
                setTimeout(() => { this.innerHTML = '<i class="fas fa-copy"></i> 复制'; }, 1500);
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof ComponentLoader !== 'undefined') {
                ComponentLoader.initPage({ loadHeader: true, loadFooter: true, headerTarget: 'header-container', footerTarget: 'footer-container', activeNav: 'tools', basePath: '../components/', toolName: '密码生成器' });
            }
            generate();
        });
    </script>
</body>
</html>
